<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Student Dashboard | Smart City College</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<header>
  <h1>Smart City College</h1>
  <nav>
    <a href="student.html">My Schedule</a>
    <a href="login.html" onclick="localStorage.clear()">Logout</a>
  </nav>
</header>

<main>
  <h2>Welcome, Student</h2>

  <div class="course-lists">
    <section class="course-column">
      <h3>Available Courses</h3>
      <input id="search" type="text" placeholder="Search by name or subject" />
      <div id="availableCourses"></div>
    </section>

    <section class="course-column">
      <h3>My Schedule</h3>
      <div id="mySchedule"></div>
    </section>
  </div>
</main>

<footer>
  <p>© 2026 Smart City College</p>
</footer>

<script>
let studentEmail = null;
let role = null;
let allCourses = [];

window.onload = () => {
  role = localStorage.getItem("role");
  studentEmail = localStorage.getItem("email");

  if (role !== "student") {
    window.location.href = "login.html";
    return;
  }

  loadAllCourses();
  loadMySchedule();

  document.getElementById("search").addEventListener("input", filterCourses);
};

async function loadAllCourses() {
  const res = await fetch("https://smart-city-5ip4.onrender.com/api/courses");
  allCourses = await res.json();
  renderAvailableCourses(allCourses);
}

async function loadMySchedule() {
  const res = await fetch(`https://smart-city-5ip4.onrender.com/api/student/courses?email=${encodeURIComponent(studentEmail)}`);
  const schedule = await res.json();
  renderMySchedule(schedule);
}

function renderAvailableCourses(courses) {
  const container = document.getElementById("availableCourses");
  container.innerHTML = "";

  courses.forEach(course => {
    const card = document.createElement("article");
    card.classList.add("course-card");

    card.innerHTML = `
      <h4>${course.title}</h4>
      <p>${course.subject} | ${course.credits} Credits</p>
      <p>${course.description}</p>
    `;

    const addBtn = document.createElement("button");
    addBtn.textContent = "Add to Schedule";
    addBtn.onclick = () => addCourse(course._id);

    card.appendChild(addBtn);
    container.appendChild(card);
  });
}

function renderMySchedule(courses) {
  const container = document.getElementById("mySchedule");
  container.innerHTML = "";

  if (!courses || courses.length === 0) {
    container.innerHTML = "<p>No classes in your schedule yet.</p>";
    return;
  }

  courses.forEach(course => {
    const card = document.createElement("article");
    card.classList.add("course-card");

    card.innerHTML = `
      <h4>${course.title}</h4>
      <p>${course.subject} | ${course.credits} Credits</p>
      <p>${course.description}</p>
    `;

    const dropBtn = document.createElement("button");
    dropBtn.textContent = "Drop Class";
    dropBtn.classList.add("danger");
    dropBtn.onclick = () => dropCourse(course._id);

    card.appendChild(dropBtn);
    container.appendChild(card);
  });
}

async function addCourse(courseId) {
  await fetch("https://smart-city-5ip4.onrender.com/api/student/courses", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ email: studentEmail, courseId })
  });

  loadMySchedule();
}

async function dropCourse(courseId) {
  await fetch(`https://smart-city-5ip4.onrender.com/api/student/courses/${courseId}`, {
    method: "DELETE",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ email: studentEmail })
  });

  loadMySchedule();
}

function filterCourses() {
  const term = document.getElementById("search").value.toLowerCase();
  const filtered = allCourses.filter(c =>
    c.title.toLowerCase().includes(term) ||
    c.subject.toLowerCase().includes(term)
  );
  renderAvailableCourses(filtered);
}
</script>

</body>
</html>
