<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Login | Smart City College</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<header>
  <h1>Smart City College</h1>
</header>

<main>
  <h2 style="text-align:center; margin-bottom:1rem;">Sign In</h2>

  <form class="login-form" id="loginForm">
    <label>
      Email
      <input id="email" type="email" placeholder="student@ivytech.edu" required />
    </label>

    <label>
      Password
      <input id="password" type="password" placeholder="Enter password" required />
    </label>

    <button type="submit">Login</button>
  </form>

  <p id="error" style="color:red; text-align:center; margin-top:1rem;"></p>
</main>

<footer>
  <p>© 2026 Smart City College</p>
</footer>

<script>
  const form = document.getElementById("loginForm");
  const errorBox = document.getElementById("error");

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    errorBox.textContent = "";

    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();

    try {
      const res = await fetch("http://127.0.0.1:3000/api/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, password })
      });

      const data = await res.json();

      if (!res.ok) {
        errorBox.textContent = data.message || "Login failed";
        return;
      }

      // Save user info
      localStorage.setItem("email", data.email);
      localStorage.setItem("role", data.role);

      // Redirect based on role
      if (data.role === "teacher") {
        window.location.href = "Teacher-course-Scheduler.html";
      } else {
        window.location.href = "student.html";
      }

    } catch (err) {
      errorBox.textContent = "Server error. Is the backend running?";
    }
  });
</script>

</body>
</html>
