<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Student Dashboard | Smart City College</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<header>
  <h1>Smart City College</h1>
  <nav>
    <a href="index.html">Courses</a>
    <a href="login.html">Logout</a>
  </nav>
</header>

<main>
  <h2>Available Courses</h2>

  <div class="course-list"></div>

  <h2 style="margin-top:3rem;">My Schedule</h2>

  <ul class="schedule">
    <li>
      English 101
      <button class="danger">Drop</button>
    </li>

    <li>
      Biology 110
      <button class="danger">Drop</button>
    </li>
  </ul>

</main>

<footer>
  <p>© 2026 Smart City College</p>
</footer>

<!-- zac added this -->
<script>
// zac added this - load courses for students
async function loadCourses() {
  const res = await fetch("http://localhost:3000/api/courses");
  const courses = await res.json();

  const list = document.querySelector(".course-list");
  list.innerHTML = ""; // zac added this

  courses.forEach(course => {
    const card = document.createElement("article");
    card.classList.add("course-card");

    card.innerHTML = `
      <h3>${course.title}</h3>
      <p><strong>Subject:</strong> ${course.subject}</p>
      <p><strong>Credits:</strong> ${course.credits}</p>
      <p>${course.description}</p>
      <button onclick="addToSchedule('${course._id}')">Add to Schedule</button>
    `;

    list.appendChild(card);
  });
}

// zac added this - placeholder for schedule system
function addToSchedule(id) {
  alert("Schedule system coming next! Course ID: " + id);
}

// zac added this - load courses when page opens
window.onload = loadCourses;
</script>

</body>
</html>
