<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Teacher Dashboard | Smart City College</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<header>
  <h1>Smart City College</h1>
  <nav>
    <a href="Teacher-course-Scheduler.html">Manage Courses</a>
    <a href="login.html" onclick="localStorage.clear()">Logout</a>
  </nav>
</header>

<main>

  <h2>Add a Course</h2>

  <form class="course-form">
    <label>Course Name
      <input id="title" type="text" required />
    </label>

    <label>Description
      <textarea id="description" required></textarea>
    </label>

    <label>Subject Area
      <input id="subject" type="text" required />
    </label>

    <label>Credits
      <input id="credits" type="number" min="1" max="6" required />
    </label>

    <button type="submit">Save Course</button>
  </form>

  <h2 style="margin-top:3rem;">Current Courses</h2>
  <div id="courseList" class="course-list"></div>

</main>

<footer>
  <p>© 2026 Smart City College</p>
</footer>

<!-- Edit Popup -->
<div id="editPopup">
  <h3>Edit Course</h3>
  <input id="editTitle" />
  <textarea id="editDescription"></textarea>
  <input id="editSubject" />
  <input id="editCredits" type="number" />
  <button onclick="saveEdit()">Save</button>
  <button onclick="closePopup()">Cancel</button>
</div>

<script>
let editingCourseId = null;
let teacherEmail = null;
let role = null;

window.onload = () => {
  role = localStorage.getItem("role");
  teacherEmail = localStorage.getItem("email");

  if (role !== "teacher") {
      window.location.href = "login.html";
      return;
  }

  loadCourses();
};

async function loadCourses() {
  const res = await fetch("https://smart-city-5ip4.onrender.com/api/courses");
  const courses = await res.json();

  const list = document.getElementById("courseList");
  list.innerHTML = "";

  courses.forEach(course => {
    const card = document.createElement("article");
    card.classList.add("course-card");

    card.innerHTML = `
      <h3>${course.title}</h3>
      <p>${course.subject} | ${course.credits} Credits</p>
      <p>${course.description}</p>
      <p><strong>Owner:</strong> ${course.owner}</p>
    `;

    if (course.owner === teacherEmail) {
      const editBtn = document.createElement("button");
      editBtn.textContent = "Edit";
      editBtn.onclick = () =>
        openEditPopup(course._id, course.title, course.description, course.subject, course.credits);

      const deleteBtn = document.createElement("button");
      deleteBtn.textContent = "Remove";
      deleteBtn.classList.add("danger");
      deleteBtn.onclick = () => deleteCourse(course._id);

      card.appendChild(editBtn);
      card.appendChild(deleteBtn);
    }

    list.appendChild(card);
  });
}

async function deleteCourse(id) {
  await fetch(`http://127.0.0.1:3000/api/courses/${id}`, {
    method: "DELETE",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ owner: teacherEmail })
  });

  loadCourses();
}

function openEditPopup(id, title, description, subject, credits) {
  editingCourseId = id;

  document.getElementById("editTitle").value = title;
  document.getElementById("editDescription").value = description;
  document.getElementById("editSubject").value = subject;
  document.getElementById("editCredits").value = credits;

  document.getElementById("editPopup").style.display = "block";
}

function closePopup() {
  document.getElementById("editPopup").style.display = "none";
}

async function saveEdit() {
  const updatedCourse = {
    title: document.getElementById("editTitle").value,
    description: document.getElementById("editDescription").value,
    subject: document.getElementById("editSubject").value,
    credits: Number(document.getElementById("editCredits").value),
    owner: teacherEmail
  };

  await fetch(`http://127.0.0.1:3000/api/courses/${editingCourseId}`, {
    method: "PUT",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(updatedCourse)
  });

  closePopup();
  loadCourses();
}

document.querySelector(".course-form").addEventListener("submit", async (e) => {
  e.preventDefault();

  const course = {
    title: document.getElementById("title").value,
    description: document.getElementById("description").value,
    subject: document.getElementById("subject").value,
    credits: Number(document.getElementById("credits").value),
    owner: teacherEmail
  };

  await fetch("http://127.0.0.1:3000/api/courses", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(course)
  });

  loadCourses();
});
</script>

</body>
</html>
